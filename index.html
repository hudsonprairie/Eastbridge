<style>

  .tagline { margin-top:26px; font-size:clamp(11px,1.3vw,15px); font-style:italic; letter-spacing:0.2em; color:rgba(212,201,176,0.55); opacity:0; animation:fadeUp 1s ease 2s forwards; }

  .notify button { background:linear-gradient(135deg,var(--gold-dark),var(--gold)); border:1px solid var(--gold); padding:12px 24px; font-family:'Cinzel',serif; font-size:10px; letter-spacing:0.25em; color:var(--green-deep); cursor:pointer; transition:all .3s; font-weight:600; }
  .notify button:hover { background:linear-gradient(135deg,var(--gold),var(--gold-light)); }

  .foot { position:absolute; bottom:28px; left:50%; transform:translateX(-50%); display:flex; align-items:center; gap:28px; opacity:0; animation:fadeUp 1s ease 2.5s forwards; }
  .fdot { width:3px; height:3px; border-radius:50%; background:var(--gold-dark); }
  .foot span { font-family:'Cinzel',serif; font-size:8px; letter-spacing:4px; color:rgba(200,168,75,0.4); white-space:nowrap; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes shimmer { 0%{left:-120%} 100%{left:220%} }
  @keyframes pulseGlow {
    0%,100%{text-shadow:0 0 60px rgba(200,168,75,0.3),0 2px 20px rgba(0,0,0,0.7)}
    50%{text-shadow:0 0 110px rgba(232,201,107,0.6),0 2px 20px rgba(0,0,0,0.7)}

</style>

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let W, H, time = 0;
function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);

// Stars
const stars = Array.from({length:90}, () => ({
  x: Math.random(), y: Math.random(),
  r: Math.random()*1.3+0.2,
  a: Math.random()*0.35+0.05,
  tw: Math.random()*Math.PI*2
}));

// Particles
class P {
  constructor(){ this.reset(); }
  reset(){
    this.x = Math.random()*W; this.y = Math.random()*H;
    this.vx = (Math.random()-.5)*0.2; this.vy = -Math.random()*0.4-0.08;
    this.sz = Math.random()*2+0.3; this.a = Math.random()*0.45+0.08;
    this.life = Math.random()*280+80; this.age = 0;
    this.gold = Math.random()>.45;
  }
  tick(){ this.x+=this.vx; this.y+=this.vy; this.age++; if(this.age>this.life||this.y<-8) this.reset(); }
  draw(){
    const f = Math.min(this.age/35,1)*Math.min((this.life-this.age)/35,1);
    ctx.globalAlpha = this.a*f;
    ctx.fillStyle = this.gold ? '#c8a84b' : '#4a8a5a';
    ctx.beginPath(); ctx.arc(this.x,this.y,this.sz,0,Math.PI*2); ctx.fill();
  }
}
const particles = Array.from({length:110}, ()=>new P());

// Wheat silhouettes
const wheats = [
  {rx:.04,ry:.68,s:1.4},{rx:.075,ry:.73,s:1.1},{rx:.115,ry:.66,s:1.6},{rx:.155,ry:.71,s:.95},
  {rx:.87,ry:.68,s:1.3},{rx:.91,ry:.72,s:1.05},{rx:.945,ry:.65,s:1.5},{rx:.978,ry:.70,s:.9},
];

function drawWheat(alpha, sway){
  ctx.save();
  ctx.translate(sway, 0);
  ctx.globalAlpha = alpha;
  ctx.strokeStyle='#7a5a12'; ctx.lineWidth=1.4;
  ctx.beginPath(); ctx.moveTo(0,58); ctx.lineTo(0,0); ctx.stroke();
  ctx.fillStyle='#8a6a1a';
  ctx.beginPath(); ctx.ellipse(0,-9,3.5,8,0,0,Math.PI*2); ctx.fill();
  [[−7,2,−.4],[7,2,.4],[−6,13,−.3],[6,13,.3]].forEach(([dx,dy,r])=>{
    ctx.beginPath(); ctx.ellipse(dx,dy,3,6,r,0,Math.PI*2); ctx.fill();
  });
  ctx.restore();
}

function frame(){
  time++;
  ctx.clearRect(0,0,W,H);
  ctx.globalAlpha=1;

  // BG gradient
  const bg = ctx.createRadialGradient(W*.5,H*.44,0,W*.5,H*.44,Math.max(W,H)*.78);
  bg.addColorStop(0,'#193828'); bg.addColorStop(.5,'#0f2218'); bg.addColorStop(1,'#050d08');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  // Center glow
  const cg = ctx.createRadialGradient(W*.5,H*.45,0,W*.5,H*.45,Math.min(W,H)*.36);
  cg.addColorStop(0,`rgba(200,168,75,${.055+.025*Math.sin(time*.018)})`);
  cg.addColorStop(1,'transparent');
  ctx.fillStyle=cg; ctx.fillRect(0,0,W,H);

  // Stars
  stars.forEach(s=>{
    const tw = Math.sin(time*.022+s.tw)*.28+.72;
    ctx.globalAlpha=s.a*tw; ctx.fillStyle='#e8d9a0';
    ctx.beginPath(); ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2); ctx.fill();
  });

  // Horizon glow
  const hy = H*.74;
  const hg = ctx.createLinearGradient(0,hy-3,0,hy+35);
  hg.addColorStop(0,`rgba(200,168,75,${.05+.03*Math.sin(time*.012)})`);
  hg.addColorStop(1,'transparent');
  ctx.fillStyle=hg; ctx.globalAlpha=1; ctx.fillRect(0,hy-3,W,38);
  ctx.globalAlpha=.1+.05*Math.sin(time*.012);
  ctx.strokeStyle='#c8a84b'; ctx.lineWidth=.7;
  ctx.beginPath(); ctx.moveTo(0,hy); ctx.lineTo(W,hy); ctx.stroke();

  // Fog
  for(let i=0;i<3;i++){
    const fx=((time*(0.1+i*.04)+i*350)%(W+500))-250;
    const fy=H*(0.56+i*.05);
    const fg=ctx.createRadialGradient(fx,fy,0,fx,fy,W*.38);
    fg.addColorStop(0,`rgba(22,52,36,${.15-i*.04})`); fg.addColorStop(1,'transparent');
    ctx.fillStyle=fg; ctx.globalAlpha=1; ctx.fillRect(0,0,W,H);
  }

  // Wheat
  wheats.forEach((w,i)=>{
    const sway=Math.sin(time*.009+i*1.1)*5;
    ctx.save(); ctx.translate(w.rx*W, w.ry*H); ctx.scale(w.s,w.s);
    drawWheat(.17+.05*Math.sin(time*.011+i), sway);
    ctx.restore();
  });

  // Particles
  particles.forEach(p=>{ p.tick(); p.draw(); });

  ctx.globalAlpha=1;
  requestAnimationFrame(frame);
}
frame();

// Notify
document.querySelector('.notify button').addEventListener('click',function(){
  const inp=document.querySelector('.notify input');
  if
